version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: match-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-match}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-matchpassword}
      POSTGRES_DB: ${POSTGRES_DB:-match_db}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_match_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-match} -d ${POSTGRES_DB:-match_db}" ]
      interval: 5s
      timeout: 5s
      retries: 5

  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.0
    container_name: ats-zookeeper
    restart: unless-stopped
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    volumes:
      - zookeeper_data:/var/lib/zookeeper/data

  kafka:
    image: confluentinc/cp-kafka:7.6.0
    container_name: ats-kafka
    restart: unless-stopped
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: [ "CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5

  ocr:
    build:
      context: ../apps/ocr
      dockerfile: Dockerfile
    container_name: ats-ocr
    restart: unless-stopped
    ports:
      - "${OCR_PORT:-9000}:9000"
    environment:
      OCR_PORT: 9000
      TESSERACT_LANG: ${TESSERACT_LANG:-eng}
      TESSDATA_PREFIX: /usr/share/tessdata
      POSTGRES_HOST: postgres
      POSTGRES_PORT: 5432
    depends_on:
      - postgres
    volumes:
      - /tmp:/tmp

volumes:
  postgres_match_data:
  zookeeper_data:
  kafka_data:

